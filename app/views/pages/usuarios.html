<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Administración de Usuarios - Ucad Tiket</title>
    <link rel="stylesheet" href="../../../recursos/libs/bootstrap4/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="../../../recursos/libs/fontawesome/css/all.min.css"/>
    <style>
        /* === Variables del tema === */
        :root {
            --primary:     #083466;
            --accent:      #ec5b13;
            --bg-dark:     #061421;
            --surface:     #0a1d2e;
            --border:      rgba(8, 52, 102, 0.3);
        }

        /* === Base === */
        body {
            font-family: 'Public Sans', sans-serif;
            background: linear-gradient(160deg, #000000 0%, #000d1f 25%, #083466 70%, #0a1d2e 100%);
            background-attachment: fixed;
            background-size: cover;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* === Navbar === */
        .navbar {
            background-color: var(--surface) !important;
            border-bottom: 1px solid var(--border) !important;
        }
        .navbar .font-weight-bold { color: #f1f5f9; }

        /* === Buscador navbar === */
        .input-group-text {
            background-color: var(--bg-dark);
            border-color: var(--border);
            color: #94a3b8;
        }
        .form-control {
            background-color: var(--bg-dark);
            border-color: var(--border);
            color: #e2e8f0;
        }
        .form-control::placeholder { color: #64748b; }
        .form-control:focus {
            background-color: var(--bg-dark);
            border-color: var(--primary);
            color: #e2e8f0;
            box-shadow: 0 0 0 2px rgba(8,52,102,0.4);
        }

        /* === Botones nav === */
        .btn-light {
            background-color: var(--surface);
            border-color: var(--border);
            color: #94a3b8;
        }
        .btn-light:hover { background-color: rgba(8,52,102,0.2); color: #fff; }

        /* === Títulos === */
        h2.font-weight-bold { color: #f1f5f9; }
        .text-muted { color: #64748b !important; }

        /* === Botón primario === */
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            font-weight: 600;
            border-radius: 0.5rem;
        }
        .btn-primary:hover { background-color: #0a4a8a; border-color: #0a4a8a; }

        /* === Buscador filtro === */
        .input-group .form-control.border-left-0 { border-left: none; }
        .input-group .input-group-text.border-right-0 { border-right: none; }

        /* === Card tabla === */
        .card {
            background-color: var(--surface);
            border: 1px solid var(--border) !important;
            border-radius: 0.75rem;
            overflow: hidden;
        }
        .card-footer {
            background-color: var(--surface);
            border-top: 1px solid var(--border);
        }

        /* === Tabla === */
        .table { color: #e2e8f0; margin-bottom: 0; }
        .table thead.thead-light th {
            background-color: rgba(8, 52, 102, 0.25);
            color: var(--primary);
            border-bottom: 1px solid var(--border);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .table td, .table th { border-color: var(--border); vertical-align: middle; }
        .table-hover tbody tr:hover { background-color: rgba(8,52,102,0.12); }

        /* === Badges iniciales usuario === */
        .badge.badge-primary.p-2 {
            background-color: rgba(8,52,102,0.4);
            color: #93c5fd;
            border-radius: 0.4rem;
            font-size: 0.7rem;
        }

        /* === Badges rol === */
        .badge-primary  { background-color: rgba(8,52,102,0.5);  color: #93c5fd; border: 1px solid rgba(8,52,102,0.6); }
        .badge-secondary{ background-color: rgba(100,116,139,0.2); color: #cbd5e1; border: 1px solid rgba(100,116,139,0.3); }
        .badge-light    { background-color: rgba(100,116,139,0.1); color: #94a3b8; border: 1px solid rgba(100,116,139,0.2); }

        /* === Badges estado === */
        .badge-success  { background-color: rgba(34,197,94,0.1);  color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
        .badge-danger   { background-color: rgba(239,68,68,0.1);  color: #f87171; border: 1px solid rgba(239,68,68,0.2); }

        .badge { font-size: 0.7rem; font-weight: 700; padding: 4px 10px; border-radius: 9999px; text-transform: uppercase; letter-spacing: 0.05em; }

        /* === Botones acción tabla === */
        .btn-outline-primary { border-color: var(--primary); color: #93c5fd; }
        .btn-outline-primary:hover { background-color: rgba(8,52,102,0.3); color: #fff; border-color: var(--primary); }
        .btn-outline-warning { border-color: var(--accent); color: var(--accent); }
        .btn-outline-warning:hover { background-color: rgba(236,91,19,0.15); color: var(--accent); border-color: var(--accent); }
        .btn-outline-danger { border-color: #ef4444; color: #f87171; }
        .btn-outline-danger:hover { background-color: rgba(239,68,68,0.15); color: #f87171; border-color: #ef4444; }

        /* === Paginación === */
        .page-link {
            background-color: var(--surface);
            border-color: var(--border);
            color: #94a3b8;
        }
        .page-link:hover { background-color: rgba(8,52,102,0.2); color: #fff; border-color: var(--border); }
        .page-item.active .page-link {
            background-color: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        /* === Modales === */
        .modal-content {
            background-color: var(--surface);
            border: 1px solid var(--border);
            color: #e2e8f0;
        }
        .modal-header {
            border-bottom: 1px solid var(--border);
        }
        .modal-footer {
            border-top: 1px solid var(--border);
        }
        .modal-title { color: #f1f5f9; }
        .close { color: #94a3b8; }
        .close:hover { color: #fff; }
        .modal label { color: #94a3b8; font-size: 0.82rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .btn-secondary {
            background-color: rgba(100,116,139,0.2);
            border-color: rgba(100,116,139,0.3);
            color: #cbd5e1;
        }
        .btn-secondary:hover { background-color: rgba(100,116,139,0.35); color: #fff; }
    </style>
</head>
<body>

<!-- Top Navigation Bar -->
<nav class="navbar navbar-light bg-white border-bottom px-3">
    <div class="container-fluid">
        <div class="row w-100 align-items-center">

            <!-- Brand -->
            <div class="col-md-auto d-flex align-items-center">
                <div class="bg-primary p-2 rounded mr-2">
                    <i class="fas fa-ticket-alt text-white"></i>
                </div>
                <span class="font-weight-bold">Ucad Tiket</span>
            </div>


            <!-- Acciones derecha -->
            <div class="col-md d-flex justify-content-end align-items-center">
                <button class="btn btn-light btn-sm mr-2">
                    <i class="fas fa-bell"></i>
                </button>
                <div style="width:1px; height:28px; background:#e2e8f0;" class="mx-2"></div>
                <button class="btn btn-light btn-sm">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>

        </div>
    </div>
</nav>

<!-- Main Content -->
<main class="container mt-4">

    <!-- Page Header + Botón agregar -->
    <div class="row align-items-center mb-3">
        <div class="col-md-8">
            <h2 class="font-weight-bold mb-1">Administración de Usuarios</h2>
            <p class="text-muted mb-0">Gestiona los accesos y roles de la plataforma.</p>
        </div>
        <div class="col-md-4 text-md-right mt-2 mt-md-0">
            <button class="btn btn-primary" data-toggle="modal" data-target="#modal_crear">
                <i class="fas fa-user-plus mr-1"></i> Agregar usuario
            </button>
        </div>
    </div>

    <!-- Buscador filtro -->
    <div class="row mb-3">
        <div class="col-md-5">
            <div class="input-group">
                <div class="input-group-prepend">
                    <span class="input-group-text bg-light border-right-0">
                        <i class="fas fa-search text-muted"></i>
                    </span>
                </div>
                <input type="text" id="inp_buscar" class="form-control border-left-0 bg-light" placeholder="Buscar usuario por nombre o correo..."/>
            </div>
        </div>
    </div>

    <!-- Tabla de Usuarios -->
    <div class="row">
        <div class="col-12">
            <div class="card border">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="thead-light">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Correo electrónico</th>
                                <th class="text-center">Rol</th>
                                <th class="text-center">Estado</th>
                                <th>Fecha registro</th>
                                <th class="text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tb_usuarios">
                            <tr>
                                <td colspan="7" class="text-center text-muted py-3">Cargando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Paginación -->
                <div class="card-footer d-flex justify-content-between align-items-center">
                    <small id="lbl_total" class="text-muted">Cargando...</small>
                </div>

            </div>
        </div>
    </div>

</main>

<!-- Modal Crear Usuario -->
<div class="modal fade" id="modal_crear" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-user-plus mr-2"></i>Nuevo usuario</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <form id="form_crear" autocomplete="off">
                <div class="modal-body">
                    <div class="form-group">
                        <label>Nombre completo</label>
                        <input type="text" id="crear_nombre" class="form-control" placeholder="Ej. Roberto González" required/>
                    </div>
                    <div class="form-group">
                        <label>Correo electrónico</label>
                        <input type="email" id="crear_correo" class="form-control" placeholder="usuario@ucad.edu.sv" required/>
                    </div>
                    <div class="form-group">
                        <label>Nombre de usuario</label>
                        <input type="text" id="crear_usuario" class="form-control" placeholder="Ej. Aleman2015" required/>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="crear_password" class="form-control" placeholder="Mínimo 8 caracteres" required/>
                    </div>
                    <div class="form-group">
                        <label>Rol</label>
                        <select id="crear_rol" class="form-control" required>
                            <option value="">-- Selecciona un rol --</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save mr-1"></i>Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal Editar Usuario -->
<div class="modal fade" id="modal_editar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-edit mr-2"></i>Editar usuario</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <form id="form_editar" autocomplete="off">
                <input type="hidden" id="editar_id"/>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Nombre completo</label>
                        <input type="text" id="editar_nombre" class="form-control" required/>
                    </div>
                    <div class="form-group">
                        <label>Correo electrónico</label>
                        <input type="email" id="editar_correo" class="form-control" required/>
                    </div>
                    <div class="form-group">
                        <label>Nombre de usuario</label>
                        <input type="text" id="editar_usuario" class="form-control" required/>
                    </div>
                    <div class="form-group">
                        <label>Nueva contraseña <small class="text-muted">(dejar vacío para no cambiar)</small></label>
                        <input type="password" id="editar_password" class="form-control" placeholder="Nueva contraseña"/>
                    </div>
                    <div class="form-group">
                        <label>Rol</label>
                        <select id="editar_rol" class="form-control" required>
                            <option value="">-- Selecciona un rol --</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save mr-1"></i>Actualizar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="../../../recursos/libs/jquery/jquery.min.js"></script>
<script src="../../../recursos/libs/bootstrap4/js/bootstrap.bundle.min.js"></script>
<script src="../../../recursos/libs/sweetalert2/sweetalert2.min.js"></script>
<script src="../../../app/controllers/usuarios/usuarios.js"></script>
</body>
</html>
