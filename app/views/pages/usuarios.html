<!-- Modal para crear usuario  -->
<div class="modal fade" id="modal_crear" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-user-plus mr-2"></i>Nuevo usuario</h5>
            </div>
            <form id="form_crear" autocomplete="off">
                <div class="modal-body">
                    <div class="form-group">
                        <label>Nombre completo</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text"><i class="fas fa-user"></i></div>
                            </div>
                            <input type="text" id="crear_nombre" class="form-control" placeholder="Ej. Roberto González" required/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Correo electrónico</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text"><i class="fas fa-envelope"></i></div>
                            </div>
                            <input type="email" id="crear_correo" class="form-control" placeholder="usuario@ucad.edu.sv" required/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Nombre de usuario</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text"><i class="fas fa-at"></i></div>
                            </div>
                            <input type="text" id="crear_usuario" class="form-control" placeholder="Ej. Aleman2015" required/>
                        </div>
                    </div>
                   
                    <div class="form-group">
                        <label>Rol</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text"><i class="fas fa-shield-alt"></i></div>
                            </div>
                            <select id="crear_rol" class="form-control" required>
                                <option value="">-- Selecciona un rol --</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save mr-1"></i>Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>
