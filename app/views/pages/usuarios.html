<!-- Vista Administración de Usuarios — parcial para padmin.html -->
<style>
    .usr-wrap h2  { color: #fff; font-weight: 800; }
    .usr-wrap p   { color: #93c5fd; }
    .usr-wrap #lbl_total { color: #4d9fff; font-weight: 700; font-size: 0.85rem; letter-spacing: 0.03em; }

    /* Inputs */
    .usr-wrap .form-control, .usr-wrap .input-group-text {
        background-color: #061421; border-color: rgba(8,52,102,0.4); color: #e2e8f0;
    }
    .usr-wrap .form-control::placeholder { color: #64748b; }
    .usr-wrap .form-control:focus { background-color: #061421; border-color: #083466; color: #e2e8f0; box-shadow: 0 0 0 2px rgba(8,52,102,0.4); }

    /* Card y tabla */
    .usr-wrap .card { background-color: #0a1d2e; border: 1px solid rgba(8,52,102,0.3) !important; border-radius: 0.75rem; overflow: hidden; }
    .usr-wrap .card-footer { background-color: #0a1d2e; border-top: 1px solid rgba(8,52,102,0.3); }
    .usr-wrap .table { color: #e2e8f0; margin-bottom: 0; }
    .usr-wrap .table thead.thead-light th { background-color: rgba(8,52,102,0.5); color: #4d9fff; border-bottom: 1px solid rgba(8,52,102,0.4); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
    .usr-wrap .table tbody tr { background-color: #061421 !important; }
    .usr-wrap .table tbody tr:nth-child(even) { background-color: #0a1d2e !important; }
    .usr-wrap .table td, .usr-wrap .table th { border-color: rgba(8,52,102,0.2); vertical-align: middle; }
    .usr-wrap .table-hover tbody tr:hover { background-color: rgba(37,99,235,0.15) !important; }

    /* Badges */
    .usr-wrap .badge { font-size: 0.7rem; font-weight: 700; padding: 4px 10px; border-radius: 9999px; text-transform: uppercase; }
    .usr-wrap .badge-primary   { background-color: rgba(8,52,102,0.5);   color: #93c5fd; border: 1px solid rgba(8,52,102,0.6); }
    .usr-wrap .badge-secondary { background-color: rgba(100,116,139,0.2); color: #cbd5e1; border: 1px solid rgba(100,116,139,0.3); }
    .usr-wrap .badge-success   { background-color: rgba(34,197,94,0.1);   color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
    .usr-wrap .badge-danger    { background-color: rgba(239,68,68,0.1);   color: #f87171; border: 1px solid rgba(239,68,68,0.2); }

    /* Botones */
    .usr-wrap .btn-primary  { background-color: #083466; border-color: #083466; font-weight: 600; border-radius: 0.5rem; }
    .usr-wrap .btn-primary:hover { background-color: #0a4a8a; }
    .usr-wrap .btn-secondary { background-color: rgba(100,116,139,0.2); border-color: rgba(100,116,139,0.3); color: #cbd5e1; }
    .usr-wrap .btn-outline-primary { border-color: #083466; color: #93c5fd; }
    .usr-wrap .btn-outline-primary:hover { background-color: rgba(8,52,102,0.3); color: #fff; }
    .usr-wrap .btn-outline-warning { border-color: #ec5b13; color: #ec5b13; }
    .usr-wrap .btn-outline-danger  { border-color: #ef4444; color: #f87171; }

    /* Modal */
    .usr-wrap .modal-content { background-color: #0a1d2e; border: 1px solid rgba(8,52,102,0.3); color: #e2e8f0; }
    .usr-wrap .modal-header  { border-bottom: 1px solid rgba(8,52,102,0.3); }
    .usr-wrap .modal-footer  { border-top: 1px solid rgba(8,52,102,0.3); }
    .usr-wrap .modal-title   { color: #f1f5f9; }
    .usr-wrap .close { color: #94a3b8; }
    .usr-wrap .modal label   { color: #94a3b8; font-size: 0.82rem; font-weight: 600; text-transform: uppercase; }
</style>

<div class="usr-wrap container-fluid mt-4">

    <!-- Page Header -->
    <div class="row align-items-center mb-3">
        <div class="col-md-8">
            <h2 class="font-weight-bold mb-1">Administración de Usuarios</h2>
            <p class="text-muted mb-0">Gestiona los accesos y roles de la plataforma.</p>
        </div>
        <div class="col-md-4 text-md-right mt-2 mt-md-0">
            <button class="btn btn-primary" data-toggle="modal" data-target="#modal_crear">
                <i class="fas fa-user-plus mr-1"></i> Agregar usuario
            </button>
        </div>
    </div>

    <!-- Buscador -->
    <div class="row mb-3">
        <div class="col-12 col-sm-8 col-md-6 col-lg-5">
            <div class="input-group" style="height:42px;">
                <div class="input-group-prepend" style="height:100%;">
                    <span class="input-group-text border-right-0 h-100" style="border-radius:0.5rem 0 0 0.5rem; padding: 0 14px;">
                        <i class="fas fa-search" style="color:#4d9fff; font-size:1rem;"></i>
                    </span>
                </div>
                <input type="text" id="inp_buscar" class="form-control border-left-0 h-100"
                    placeholder="Buscar por nombre o correo..."
                    style="border-radius:0 0.5rem 0.5rem 0;"/>
            </div>
        </div>
    </div>

    <!-- Tabla -->
    <div class="row">
        <div class="col-12">
            <div class="card border">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="thead-light">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Correo electrónico</th>
                                <th class="text-center">Rol</th>
                                <th class="text-center">Estado</th>
                                <th>Fecha registro</th>
                                <th class="text-right">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tb_usuarios">
                            <tr>
                                <td colspan="7" class="text-center text-muted py-3">Cargando...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer d-flex justify-content-between align-items-center">
                    <small id="lbl_total" class="text-muted">Cargando...</small>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Modal Crear Usuario -->
<div class="modal fade" id="modal_crear" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-user-plus mr-2"></i>Nuevo usuario</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <form id="form_crear" autocomplete="off">
                <div class="modal-body">
                    <div class="form-group">
                        <label>Nombre completo</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text"><i class="fas fa-user"></i></div>
                            </div>
                            <input type="text" id="crear_nombre" class="form-control" placeholder="Ej. Roberto González" required/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Correo electrónico</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text"><i class="fas fa-envelope"></i></div>
                            </div>
                            <input type="email" id="crear_correo" class="form-control" placeholder="usuario@ucad.edu.sv" required/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Nombre de usuario</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text"><i class="fas fa-at"></i></div>
                            </div>
                            <input type="text" id="crear_usuario" class="form-control" placeholder="Ej. Aleman2015" required/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text"><i class="fas fa-lock"></i></div>
                            </div>
                            <input type="password" id="crear_password" class="form-control" placeholder="Mínimo 8 caracteres" required/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Rol</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text"><i class="fas fa-shield-alt"></i></div>
                            </div>
                            <select id="crear_rol" class="form-control" required>
                                <option value="">-- Selecciona un rol --</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save mr-1"></i>Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Modal Editar Usuario -->
<div class="modal fade" id="modal_editar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-edit mr-2"></i>Editar usuario</h5>
                <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
            </div>
            <form id="form_editar" autocomplete="off">
                <input type="hidden" id="editar_id"/>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Nombre completo</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text"><i class="fas fa-user"></i></div>
                            </div>
                            <input type="text" id="editar_nombre" class="form-control" required/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Correo electrónico</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text"><i class="fas fa-envelope"></i></div>
                            </div>
                            <input type="email" id="editar_correo" class="form-control" required/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Nombre de usuario</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text"><i class="fas fa-at"></i></div>
                            </div>
                            <input type="text" id="editar_usuario" class="form-control" required/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Nueva contraseña <small class="text-muted">(dejar vacío para no cambiar)</small></label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text"><i class="fas fa-lock"></i></div>
                            </div>
                            <input type="password" id="editar_password" class="form-control" placeholder="Nueva contraseña"/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Rol</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <div class="input-group-text"><i class="fas fa-shield-alt"></i></div>
                            </div>
                            <select id="editar_rol" class="form-control" required>
                                <option value="">-- Selecciona un rol --</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="guardar_edicion()"><i class="fas fa-save mr-1"></i>Actualizar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="/TICKETUCAD/recursos/libs/sweetalert2/sweetalert2.min.js"></script>
<script src="/TICKETUCAD/app/controllers/usuarios/usuarios.js"></script>
