<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Ticket</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --panel-2: #1f2937;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --line: #334155;
            --primary: #2563eb;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 980px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .card-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.02);
            font-weight: 700;
        }

        .card-body { padding: 16px; }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 10px 14px;
        }

        .meta-item {
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel-2);
        }

        .meta-item small {
            display: block;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .descripcion {
            margin-top: 14px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: var(--panel-2);
            white-space: pre-wrap;
        }

        .timeline {
            max-height: 360px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .msg {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            background: var(--panel-2);
        }

        .msg-head {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .msg-user { font-weight: 700; }
        .msg-date { color: var(--muted); }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        textarea {
            width: 100%;
            min-height: 140px;
            resize: vertical;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: #0b1220;
            color: var(--text);
            padding: 10px;
            outline: none;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-weight: 700;
        }

        .btn-primary { background: var(--primary); color: #fff; }
        .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--line); }
        .error { color: var(--danger); }
    </style>
</head>
<body>
    <div class="container">
        <div class="actions" style="margin-bottom: 10px;">
            <button class="btn-outline" id="btnVolver">Volver a bandeja</button>
            <span id="estadoCargando" style="color: var(--muted);"></span>
        </div>

        <div class="card">
            <div class="card-header">Detalle del ticket</div>
            <div class="card-body">
                <h2 id="tituloTicket" style="margin-top: 0;">Cargando...</h2>
                <div class="meta-grid" id="metaTicket"></div>
                <div class="descripcion" id="descripcionTicket">Cargando descripción...</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Historial / Respuestas</div>
            <div class="card-body">
                <div id="contenedorMensajes" class="timeline"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Responder ticket</div>
            <div class="card-body">
                <textarea id="txtRespuesta" placeholder="Escribe aquí tu respuesta..."></textarea>
                <div class="actions" style="margin-top: 10px;">
                    <button class="btn-primary" id="btnEnviar">Enviar respuesta</button>
                    <span id="msgEnvio"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="/TICKETUCAD/app/controllers/tickets/vista_ticket.js"></script>
</body>
</html>
