<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Inicio de Sesión | Ticket UCAD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/TICKETUCAD/recursos/libs/fonts/inter/inter.css">
    <link rel="stylesheet" href="/TICKETUCAD/recursos/libs/bootstrap-icons/css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/TICKETUCAD/recursos/libs/sweetalert2/sweetalert2.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            min-height: 100vh;
            background: #0a0f1e;
        }

        /* ── LAYOUT ── */
        .layout {
            display: grid;
            grid-template-columns: 420px 1fr;
            width: 100%;
            min-height: 100vh;
        }

        /* ── PANEL IZQUIERDO (formulario) ── */
        .panel-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 44px;
            background: rgba(10, 18, 40, 0.97);
            border-right: 1px solid rgba(255,255,255,0.07);
            position: relative;
            z-index: 2;
        }

        .avatar-wrap {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 1.5px solid rgba(77,159,255,0.4);
            box-shadow: 0 0 24px rgba(37,99,235,0.2), inset 0 0 20px rgba(10,18,40,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            background: rgba(10,18,40,0.85);
        }

        .avatar-wrap img {
            width: 58px;
            height: 58px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(77,159,255,0.5));
        }

        .form-inner {
            width: 100%;
        }

        /* Campos */
        .field-group {
            margin-bottom: 16px;
        }

        .field-wrap {
            position: relative;
        }

        .field-wrap > i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #2d5a8a;
            font-size: 15px;
            pointer-events: none;
            transition: color 0.2s;
        }

        .field-wrap input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 13px 44px 13px 44px;
            color: #fff;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            letter-spacing: 0.5px;
        }

        .field-wrap input::placeholder {
            color: #3a5a7a;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .field-wrap input:focus {
            border-color: #2563eb;
            background: rgba(37,99,235,0.06);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }

        .field-wrap:focus-within > i { color: #4d9fff; }

        /* Toggle password */
        .toggle-pass {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #2d5a8a;
            cursor: pointer;
            font-size: 15px;
            padding: 4px;
            transition: color 0.2s;
        }
        .toggle-pass:hover { color: #4d9fff; }

        /* Botón */
        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #1e5fd4, #2563eb);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 24px rgba(37,99,235,0.4);
            margin-top: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 32px rgba(37,99,235,0.55);
        }

        .btn-submit:active { transform: translateY(0); }

        /* ── PANEL DERECHO (visual) ── */
        .panel-info {
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 0;
        }

        /* Fondo animado */
        .bg-animated {
            position: absolute;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, #0d2a6e33 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, #1a4fa833 0%, transparent 55%),
                        radial-gradient(ellipse at 60% 80%, #0b3d9133 0%, transparent 50%),
                        #0a0f1e;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 8s ease-in-out infinite;
        }
        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #1e5fd4, #0a2a7a);
            top: -150px; right: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #0e3fa8, #071e5c);
            bottom: -100px; left: 10%;
            animation-delay: 3s;
        }
        .orb-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #2563eb, #1040a0);
            top: 40%; left: 50%;
            animation-delay: 5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50%       { transform: translateY(-30px) scale(1.05); }
        }

        /* Video de fondo */
        .video-bg {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.25;
        }

        .video-bg-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to right,
                rgba(10,15,30,0.6) 0%,
                rgba(10,15,30,0.1) 100%
            );
        }

        /* Contenido del panel derecho */
        .panel-info-content {
            position: relative;
            z-index: 2;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 48px;
            height: 100%;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-logo {
            width: 52px;
            height: 52px;
            object-fit: contain;
            filter: drop-shadow(0 0 12px rgba(77,159,255,0.45));
        }

        .brand-text .brand-name {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }

        .brand-text .brand-sub {
            font-size: 11px;
            color: #4d7aaa;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .welcome-block {
            margin-bottom: 0;
        }

        .welcome-block h1 {
            font-size: 56px;
            font-weight: 800;
            color: #fff;
            line-height: 1.05;
            margin-bottom: 20px;
        }

        .welcome-block h1 span {
            background: linear-gradient(90deg, #4d9fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-block p {
            font-size: 14px;
            color: #5a7a9a;
            line-height: 1.75;
            max-width: 400px;
            margin-bottom: 36px;
        }

        .stats-row {
            display: flex;
            gap: 32px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-num {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }

        .stat-label {
            font-size: 11px;
            color: #3a5a7a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-divider {
            width: 1px;
            background: #1a2d4a;
            align-self: stretch;
        }

        /* Live badge */
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(37,99,235,0.12);
            border: 1px solid rgba(37,99,235,0.2);
            border-radius: 50px;
            padding: 8px 16px;
            margin-bottom: 28px;
        }

        .live-badge .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #4d9fff;
            box-shadow: 0 0 8px #4d9fff;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(1.3); }
        }

        .live-badge span {
            font-size: 12px;
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.5px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 900px) {
            .panel-info { display: none; }
            .layout { grid-template-columns: 1fr; }
            .panel-form { width: 100%; border-right: none; }
        }
    </style>
</head>
<body>

    <div class="layout">

        <!-- Panel izquierdo: formulario -->
        <div class="panel-form">

            <div class="avatar-wrap">
                <img src="/TICKETUCAD/media/img/logo.png" alt="Logo UCAD">
            </div>

            <div class="form-inner">
                <form id="loginForm" action="#" method="post">

                    <div class="field-group">
                        <div class="field-wrap">
                            <i class="bi bi-person-fill"></i>
                            <input type="text" id="usuario" name="usuario" placeholder="Username" required>
                        </div>
                    </div>

                    <div class="field-group">
                        <div class="field-wrap">
                            <i class="bi bi-lock-fill"></i>
                            <input type="password" id="password" name="password" placeholder="••••••••••" required>
                            <button type="button" class="toggle-pass" id="togglePass" tabindex="-1">
                                <i class="bi bi-eye-slash" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">Login</button>

                </form>
            </div>

        </div>

        <!-- Panel derecho: visual -->
        <div class="panel-info">

            <div class="bg-animated">
                <div class="orb orb-1"></div>
                <div class="orb orb-2"></div>
                <div class="orb orb-3"></div>
            </div>

            <div class="video-bg">
                <video autoplay muted loop playsinline>
                    <source src="/TICKETUCAD/media/video/vid1.mp4" type="video/mp4">
                </video>
                <div class="video-bg-overlay"></div>
            </div>

            <div class="panel-info-content">
                <div class="brand">
                    
                    <div class="brand-text">
                        <div class="brand-name">TICKET UCAD</div>
                        <div class="brand-sub">Soporte IT</div>
                    </div>
                </div>

                <div class="welcome-block">
                    <div class="live-badge">
                        <div class="dot"></div>
                        <span>Sistema activo en tiempo real</span>
                    </div>
                    <h1>Bienvenido<span>.</span></h1>
                    <p>Gestión avanzada y resolución de incidentes en tiempo real. Accede para administrar y dar seguimiento a tus tickets de soporte.</p>
                    <div class="stats-row">
                        <div class="stat-item">
                            <span class="stat-num">99%</span>
                            <span class="stat-label">Resolución</span>
                        </div>
                        <div class="stat-divider"></div>
                        <div class="stat-item">
                            <span class="stat-num">24/5</span>
                            <span class="stat-label">Disponible</span>
                        </div>
                        
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script>
        if (window.location.pathname !== '/TICKETUCAD/inicio-sesion') {
            window.history.replaceState(null, 'Inicio de Sesión', '/TICKETUCAD/inicio-sesion');
        }
    </script>
    <script src="/TICKETUCAD/recursos/libs/sweetalert2/sweetalert2.min.js"></script>
    <script src="/TICKETUCAD/app/controllers/login/login.js"></script>
</body>
</html>
