<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Panel Administrador | Ticket UCAD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/TICKETUCAD/recursos/libs/fonts/inter/inter.css">
    <link rel="stylesheet" href="/TICKETUCAD/recursos/libs/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/TICKETUCAD/recursos/libs/bootstrap-icons/css/bootstrap-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-base:    #0a0f1e;
            --bg-sidebar: #0d1528;
            --bg-card:    rgba(255,255,255,0.04);
            --border:     rgba(255,255,255,0.08);
            --accent:     #2563eb;
            --accent-2:   #4d9fff;
            --text:       #e2e8f0;
            --text-muted: #5a7a9a;
            --sidebar-w:  240px;
            --header-h:   60px;
        }
        html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-base); color: var(--text); }

        /* ── SIDEBAR ── */
        .sidebar {
            position: fixed; top: 0; left: 0;
            width: var(--sidebar-w); height: 100vh;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            z-index: 100; transition: transform .3s;
        }
        .sidebar-brand {
            display: flex; align-items: center; gap: 12px;
            padding: 18px 20px; border-bottom: 1px solid var(--border);
        }
        .sidebar-brand img { width: 38px; height: 38px; object-fit: contain; filter: drop-shadow(0 0 8px rgba(77,159,255,.4)); }
        .sidebar-brand .brand-name { font-size: 15px; font-weight: 700; color: #fff; }
        .sidebar-brand .brand-sub  { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }

        .sidebar-nav { flex: 1; overflow-y: auto; padding: 12px 0; }
        .nav-section { padding: 16px 20px 6px; font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.2px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 20px; font-size: 13px; color: #8aa0bb; cursor: pointer; border-left: 3px solid transparent; transition: all .2s; text-decoration: none; }
        .nav-item i { font-size: 16px; width: 20px; text-align: center; }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,.04); }
        .nav-item.active { color: var(--accent-2); background: rgba(37,99,235,.1); border-left-color: var(--accent); }
        .nav-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }

        .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
        .sidebar-user { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg,#1e5fd4,#2563eb); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .user-info .user-name { font-size: 13px; font-weight: 600; color: #fff; }
        .user-info .user-role { font-size: 11px; color: var(--text-muted); }
        .btn-logout { margin-left: auto; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; transition: color .2s; }
        .btn-logout:hover { color: #ef4444; }

        /* ── HEADER ── */
        .main-header {
            position: fixed; top: 0; left: var(--sidebar-w); right: 0;
            height: var(--header-h);
            background: rgba(13,21,40,.9); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 24px;
            z-index: 99; gap: 16px;
        }
        .btn-toggle { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; display: none; }
        .header-search { position: relative; flex: 1; max-width: 320px; }
        .header-search input { width: 100%; background: rgba(255,255,255,.06); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px 8px 36px; color: var(--text); font-size: 13px; font-family: 'Inter',sans-serif; outline: none; transition: border-color .2s; }
        .header-search input::placeholder { color: var(--text-muted); }
        .header-search input:focus { border-color: var(--accent); }
        .header-search i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; }
        .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
        .header-icon-btn { background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; position: relative; transition: all .2s; text-decoration: none; }
        .header-icon-btn:hover { color: #fff; border-color: rgba(255,255,255,.2); }
        .header-icon-btn .badge-dot { position: absolute; top: 6px; right: 6px; width: 7px; height: 7px; border-radius: 50%; background: #ef4444; border: 1.5px solid var(--bg-base); }

        /* ── MAIN WRAPPER ── */
        .main-wrapper { margin-left: var(--sidebar-w); padding-top: var(--header-h); min-height: 100vh; }
        .main-content { padding: 28px 28px; }

        /* ── PAGE TITLE ── */
        .page-title { margin-bottom: 24px; }
        .page-title h1 { font-size: 22px; font-weight: 700; color: #fff; }
        .page-title p  { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .breadcrumb-bar { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
        .breadcrumb-bar i { font-size: 10px; }

        /* ── STAT CARDS ── */
        .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; display: flex; align-items: center; gap: 16px; transition: border-color .2s; }
        .stat-card:hover { border-color: rgba(37,99,235,.4); }
        .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .stat-icon.blue   { background: rgba(37,99,235,.15);  color: #4d9fff; }
        .stat-icon.green  { background: rgba(16,185,129,.15); color: #34d399; }
        .stat-icon.yellow { background: rgba(245,158,11,.15); color: #fbbf24; }
        .stat-icon.red    { background: rgba(239,68,68,.15);  color: #f87171; }
        .stat-info .stat-val   { font-size: 26px; font-weight: 700; color: #fff; line-height: 1; }
        .stat-info .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .stat-info .stat-trend { font-size: 11px; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
        .trend-up   { color: #34d399; }
        .trend-down { color: #f87171; }

        /* ── CARDS GENERALES ── */
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
        .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .card-header h3 { font-size: 14px; font-weight: 600; color: #fff; }
        .card-header .card-actions { display: flex; gap: 8px; }
        .card-body { padding: 20px; }

        /* ── TABLA TICKETS ── */
        .tickets-table { width: 100%; border-collapse: collapse; }
        .tickets-table th { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .8px; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
        .tickets-table td { padding: 13px 14px; font-size: 13px; color: var(--text); border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: middle; }
        .tickets-table tr:last-child td { border-bottom: none; }
        .tickets-table tr:hover td { background: rgba(255,255,255,.02); }

        .ticket-id { font-weight: 600; color: var(--accent-2); font-size: 12px; }
        .ticket-subject { font-weight: 500; color: #fff; }
        .ticket-subject small { display: block; font-size: 11px; color: var(--text-muted); font-weight: 400; margin-top: 2px; }

        /* Badges de estado */
        .badge-status { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-status::before { content:''; width:6px; height:6px; border-radius:50%; }
        .badge-open     { background: rgba(37,99,235,.15);  color: #4d9fff;  } .badge-open::before     { background: #4d9fff; }
        .badge-progress { background: rgba(245,158,11,.15); color: #fbbf24; } .badge-progress::before { background: #fbbf24; }
        .badge-closed   { background: rgba(16,185,129,.15); color: #34d399; } .badge-closed::before   { background: #34d399; }
        .badge-urgent   { background: rgba(239,68,68,.15);  color: #f87171; } .badge-urgent::before   { background: #f87171; }

        /* Prioridad */
        .priority { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; }
        .priority-alta   { color: #f87171; }
        .priority-media  { color: #fbbf24; }
        .priority-baja   { color: #34d399; }

        /* Avatar agente */
        .agent-cell { display: flex; align-items: center; gap: 8px; }
        .agent-av { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg,#1e5fd4,#7c3aed); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }

        /* Botones acción tabla */
        .btn-action { background: rgba(255,255,255,.06); border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; color: var(--text-muted); cursor: pointer; font-size: 13px; transition: all .2s; }
        .btn-action:hover { color: #fff; border-color: rgba(255,255,255,.2); }

        /* ── GRID INFERIOR ── */
        .bottom-grid { display: grid; grid-template-columns: 1fr 340px; gap: 16px; margin-top: 16px; }

        /* Actividad reciente */
        .activity-list { display: flex; flex-direction: column; gap: 0; }
        .activity-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
        .activity-item:last-child { border-bottom: none; }
        .activity-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
        .activity-text { font-size: 13px; color: var(--text); line-height: 1.5; }
        .activity-text span { color: var(--accent-2); font-weight: 500; }
        .activity-time { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

        /* Agentes */
        .agent-list { display: flex; flex-direction: column; gap: 2px; }
        .agent-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.04); }
        .agent-row:last-child { border-bottom: none; }
        .agent-av-lg { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
        .agent-meta .agent-name { font-size: 13px; font-weight: 600; color: #fff; }
        .agent-meta .agent-dept { font-size: 11px; color: var(--text-muted); }
        .agent-tickets { margin-left: auto; text-align: right; }
        .agent-tickets .t-num { font-size: 15px; font-weight: 700; color: #fff; }
        .agent-tickets .t-label { font-size: 10px; color: var(--text-muted); }
        .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #34d399; box-shadow: 0 0 6px #34d399; flex-shrink: 0; }
        .offline-dot { width: 8px; height: 8px; border-radius: 50%; background: #4a5568; flex-shrink: 0; }

        /* ── BTN PRIMARIO ── */
        .btn-primary-custom { background: linear-gradient(135deg,#1e5fd4,#2563eb); border: none; border-radius: 8px; padding: 8px 16px; color: #fff; font-size: 13px; font-weight: 600; font-family: 'Inter',sans-serif; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all .2s; box-shadow: 0 4px 16px rgba(37,99,235,.3); }
        .btn-primary-custom:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,.45); }
        .btn-sm-ghost { background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 7px; padding: 6px 12px; color: var(--text-muted); font-size: 12px; font-family: 'Inter',sans-serif; cursor: pointer; transition: all .2s; }
        .btn-sm-ghost:hover { color: #fff; border-color: rgba(255,255,255,.2); }

        /* ── RESPONSIVE ── */
        @media (max-width: 1100px) { .stats-grid { grid-template-columns: repeat(2,1fr); } }
        @media (max-width: 900px)  { .bottom-grid { grid-template-columns: 1fr; } }
        @media (max-width: 768px)  {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-wrapper { margin-left: 0; }
            .main-header { left: 0; }
            .btn-toggle { display: block; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) { .stats-grid { grid-template-columns: 1fr; } .main-content { padding: 16px; } }

        /* === Estilos vista usuarios === */
        .usr-wrap .table tbody tr td { background-color: #061421 !important; color: #e2e8f0 !important; }
        .usr-wrap .table tbody tr:nth-child(even) td { background-color: #0a1d2e !important; }
        .usr-wrap .table-hover tbody tr:hover td { background-color: rgba(37,99,235,0.15) !important; }
        .usr-wrap .table td, .usr-wrap .table th { border-color: rgba(8,52,102,0.2) !important; }
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <img src="/TICKETUCAD/media/img/logo.png" alt="Logo">
        <div>
            <div class="brand-name">TICKET UCAD</div>
            <div class="brand-sub">Soporte IT</div>
        </div>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-section">Principal</div>
        <a href="#" class="nav-item active" data-view="inicio">
            <i class="bi bi-house-fill"></i> Inicio
        </a>
        <a href="#" class="nav-item" data-view="tickets">
            <i class="bi bi-ticket-detailed-fill"></i> Bandeja Tickets
            <span class="nav-badge" id="badge-tickets">12</span>
        </a>
        <a href="#" class="nav-item" data-view="abrir-tickets">
            <i class="bi bi-ticket-detailed-fill"></i> Abrir Tickets
            <span class="nav-badge">12</span>
        </a>
        <a href="#" class="nav-item" data-view="dashboard">
            <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>

        <div class="nav-section">Gestión</div>
        <a href="#" class="nav-item" data-view="usuarios">
            <i class="bi bi-people-fill"></i>Administracion Usuarios
        </a>
        <a href="#" class="nav-item" data-view="reportes">
            <i class="bi bi-person-badge-fill"></i>Reportes
        </a>
        <a href="#" class="nav-item" data-view="configuracion">
            <i class="bi bi-gear-fill"></i> Configuración
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="sidebar-user">
            <div class="user-avatar">A</div>
            <div class="user-info">
                <div class="user-name">Administrador</div>
                <div class="user-role">Super Admin</div>
            </div>
            <button class="btn-logout" title="Cerrar sesión" onclick="sessionStorage.removeItem('ucad_nombre'); sessionStorage.removeItem('ucad_rol'); window.location.href='/TICKETUCAD/inicio-sesion'">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </div>
    </div>
</aside>

<header class="main-header">
    <button class="btn-toggle" id="btnToggle"><i class="bi bi-list"></i></button>

    <div class="header-search">
        <i class="bi bi-search"></i>
        <input type="text" placeholder="Buscar tickets, usuarios...">
    </div>

    <div class="header-right">
        <button class="header-icon-btn" title="Notificaciones">
            <i class="bi bi-bell-fill"></i>
            <span class="badge-dot"></span>
        </button>
        <button class="header-icon-btn" title="Mensajes">
            <i class="bi bi-chat-dots-fill"></i>
        </button>
        <button class="header-icon-btn" title="Pantalla completa" id="btnFullscreen">
            <i class="bi bi-fullscreen"></i>
        </button>
    </div>
</header>

<div class="main-wrapper">
    <div class="main-content" id="main-content">
        </div>
</div>

<link rel="stylesheet" href="/TICKETUCAD/recursos/libs/sweetalert2/sweetalert2.min.css"/>
<script src="/TICKETUCAD/recursos/libs/jquery/jquery.min.js"></script>
<script src="/TICKETUCAD/recursos/libs/bootstrap4/js/bootstrap.bundle.min.js"></script>
<script src="/TICKETUCAD/recursos/libs/sweetalert2/sweetalert2.min.js"></script>
<script src="/TICKETUCAD/app/controllers/login/padmin.js"></script>
<script src="/TICKETUCAD/app/controllers/tickets/tickets.js"></script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts@5.3.6/dist/apexcharts.min.js"></script>

<script src="/TICKETUCAD/app/controllers/dashboard/dashboard_controller.js"></script>

<script src="/TICKETUCAD/recursos/libs/apexcharts/apexcharts.min.js"></script>
</body>
</html>
