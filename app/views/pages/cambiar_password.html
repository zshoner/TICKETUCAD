<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Cambiar Contraseña | Ticket UCAD</title>
    <link rel="stylesheet" href="/TICKETUCAD/recursos/libs/fonts/inter/inter.css"/>
    <link rel="stylesheet" href="/TICKETUCAD/recursos/libs/bootstrap-icons/css/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="/TICKETUCAD/recursos/libs/sweetalert2/sweetalert2.min.css"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: #061421;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card-pass {
            width: 100%;
            max-width: 420px;
            background: #0a1d2e;
            border: 1px solid rgba(8,52,102,0.3);
            border-radius: 0.75rem;
            padding: 40px 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .avatar-wrap {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 1.5px solid rgba(77,159,255,0.4);
            box-shadow: 0 0 24px rgba(37,99,235,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            background: rgba(10,18,40,0.85);
        }
        .avatar-wrap img {
            width: 44px;
            height: 44px;
            object-fit: contain;
            filter: drop-shadow(0 0 6px rgba(77,159,255,0.5));
        }

        h1 {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitulo {
            color: #94a3b8;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 28px;
        }

        .field-group {
            margin-bottom: 18px;
        }

        .field-label {
            display: block;
            color: #94a3b8;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .field-wrap {
            position: relative;
        }

        .field-wrap i.icon-left {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #4d9fff;
            font-size: 1rem;
        }

        .field-wrap input {
            width: 100%;
            padding: 12px 44px 12px 42px;
            background: #061421;
            border: 1px solid rgba(8,52,102,0.4);
            color: #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .field-wrap input::placeholder {
            color: #475569;
        }
        .field-wrap input:focus {
            border-color: #4d9fff;
            box-shadow: 0 0 0 2px rgba(77,159,255,0.2);
        }

        .toggle-pass {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
        }
        .toggle-pass:hover { color: #4d9fff; }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: #083466;
            color: #fff;
            border: 1px solid rgba(77,159,255,0.3);
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-submit:hover {
            background: #0a4a8a;
            box-shadow: 0 0 20px rgba(77,159,255,0.4);
        }

        .info-box {
            background: rgba(8,52,102,0.2);
            border: 1px solid rgba(77,159,255,0.2);
            border-radius: 0.5rem;
            padding: 12px;
            color: #93c5fd;
            font-size: 0.82rem;
            margin-bottom: 20px;
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }
        .info-box i {
            font-size: 1rem;
            flex-shrink: 0;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <div class="card-pass">

        <div class="avatar-wrap">
            <img src="/TICKETUCAD/media/img/logo.png" alt="UCAD">
        </div>

        <h1>Cambiar Contrasena</h1>
        <p class="subtitulo">Crea una nueva contrasena para continuar.</p>

        <div class="info-box">
            <i class="bi bi-info-circle"></i>
            <span>Tu contrasena debe tener minimo 8 caracteres.</span>
        </div>

        <form id="formCambiarPassword">

            <div class="field-group">
                <label class="field-label">Nueva contrasena</label>
                <div class="field-wrap">
                    <i class="bi bi-lock icon-left"></i>
                    <input type="password" id="nueva_password" placeholder="Minimo 8 caracteres" required/>
                    <button type="button" class="toggle-pass" onclick="togglePass('nueva_password', this)">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Confirmar contrasena</label>
                <div class="field-wrap">
                    <i class="bi bi-shield-lock icon-left"></i>
                    <input type="password" id="confirmar_password" placeholder="Repite la contrasena" required/>
                    <button type="button" class="toggle-pass" onclick="togglePass('confirmar_password', this)">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                Guardar contrasena
            </button>

        </form>

    </div>

    <script src="/TICKETUCAD/recursos/libs/jquery/jquery.min.js"></script>
    <script src="/TICKETUCAD/recursos/libs/sweetalert2/sweetalert2.min.js"></script>
    <script src="/TICKETUCAD/app/controllers/login/cambiar_password.js"></script>

    <script>
        // Mostrar / ocultar contrasena
        function togglePass(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon  = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye-slash';
            }
        }
    </script>
</body>
</html>
