<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Cambiar Contraseña | Ticket UCAD</title>
    <link rel="stylesheet" href="/TICKETUCAD/recursos/libs/bootstrap/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/TICKETUCAD/recursos/libs/bootstrap-icons/css/bootstrap-icons.min.css"/>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center align-items-center" style="min-height:100vh;">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">

                <div class="card">
                    <div class="card-body">
                        <h4 class="card-title text-center mb-4">Cambiar Contraseña</h4>
                        <p class="text-muted text-center mb-4">Debes crear una nueva contraseña para continuar.</p>

                        <form id="formCambiarPassword">
                            <div class="form-group">
                                <label>Nueva contraseña</label>
                                <input type="password" id="nueva_password" class="form-control" placeholder="Mínimo 8 caracteres" required/>
                            </div>
                            <div class="form-group">
                                <label>Confirmar contraseña</label>
                                <input type="password" id="confirmar_password" class="form-control" placeholder="Repite la contraseña" required/>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">Guardar</button>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="/TICKETUCAD/recursos/libs/jquery/jquery.min.js"></script>
    <script src="/TICKETUCAD/recursos/libs/bootstrap4/js/bootstrap.bundle.min.js"></script>
    <script src="/TICKETUCAD/recursos/libs/sweetalert2/sweetalert2.min.js"></script>
    <script src="/TICKETUCAD/app/controllers/login/cambiar_password.js"></script>
</body>
</html>
