<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TICKET | UCAD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/x-icon" href="img/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/nalika-icon.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simplebar@6.2.7/dist/simplebar.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <link rel="stylesheet" href="../assets/css/estilos.css"> 
    
    <style>
        body { font-family: Arial, sans-serif; background-color: #152036; margin: 0; padding: 20px; }
        .form-container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; border: 1px solid #2165bd; border-radius: 4px; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 120px; }
        .btn-submit { background-color: #152036; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; transition: background 0.3s; }
        .btn-submit:hover { background-color: #004494; }
        .help-text { font-size: 12px; color: #666; margin-top: 4px; display: block; }
    </style>
</head>
<body>


    <div class="form-container">
        <div class="sidebar-header" align="center">
                    <img class="main-logo" src="media/img/logo.png" alt="Logo" style="max-height:100px; width:auto; margin-block:10px;">
        </div>
        <h2 align="center">Ingresar Nuevo Ticket</h2>
        <p>Por favor, describe tu problema detalladamente para que nuestro equipo pueda ayudarte.</p>

        <form action="app/models/php/procesar_ticket.php" method="POST">

            <div class="form-group">
                <label for="titulo">Título del problema resumido:</label>
                <input type="text" id="titulo" name="titulo" required 
                       placeholder="Ej. Problema con el teclado">
                <span class="help-text">Breve descripción del incidente</span>
            </div>

            <div class="form-group">
                <label for="categoria_id">Categoría del problema:</label>
                <select id="categoria_id" name="categoria_id" required>
                    <option value="" disabled selected>-- Selecciona una categoría --</option>
                    <option value="1">Petición administrativa</option>
                    <option value="2">Instalación de software</option>
                    <option value="3">Problema de hardware</option>
                    <option value="4">Problema de software</option>
                    <option value="5">Usuario que no puede trabajar</option>
                </select>
            </div>

            <div class="form-group">
                <label for="prioridad_id">Nivel de prioridad:</label>
                <select id="prioridad_id" name="prioridad_id" required>
                    <option value="" disabled selected>-- Selecciona la prioridad --</option>
                    <option value="1">Baja (Puede esperar)</option>
                    <option value="2">Media (Afecta mi trabajo parcial)</option>
                    <option value="3">Alta (Me impide trabajar por completo)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="descripcion">Descripción detallada:</label>
                <textarea id="descripcion" name="descripcion" required 
                          placeholder="Describe con el mayor detalle posible lo que está ocurriendo..."></textarea>
            </div>

            <div class="form-group">
                <button type="submit" class="btn-submit">Enviar Ticket</button>
            </div>

        </form>
    </div>

</body>
</html>
