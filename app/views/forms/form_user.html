<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA TICKET | UCAD</title>
    
    <style>
        /* Se encapsularon los estilos usando ".form-container" al principio
           para evitar que afecten el diseño global del panel de administración (como el buscador).
        */
        .form-container { 
            font-family: Arial, sans-serif; 
            max-width: 620px; 
            margin: 20px auto; 
            background: #fff; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        .form-container .form-group { margin-bottom: 20px; }
        .form-container label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        
        .form-container input[type="text"], 
        .form-container input[type="email"], 
        .form-container select, 
        .form-container textarea { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #2165bd; 
            border-radius: 4px; 
            box-sizing: border-box; 
        }
        
        .form-container textarea { resize: vertical; min-height: 120px; }
        
        .form-container .btn-submit { 
            background-color: #152036; 
            color: white; 
            padding: 12px 20px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            transition: background 0.3s; 
        }
        
        .form-container .btn-submit:hover { background-color: #004494; }
        .form-container .help-text { font-size: 12px; color: #2a6dffd7; margin-top: 4px; display: block; }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="sidebar-header" align="center">
            <img class="main-logo" src="media/img/logo.png" alt="Logo" style="max-height:100px; width:auto; margin-block:10px;">
        </div>
        <h2 align="center" style="color: #152036;">Ingresar Nuevo Ticket</h2>
        <p style="color:#152036">Por favor, describe tu problema detalladamente para que nuestro equipo pueda ayudarte.</p>

        <form action="app/models/php/procesar_ticket.php" method="POST">

            <div class="form-group">
                <label for="titulo">Título del problema resumido:</label>
                <input type="text" id="titulo" name="titulo" required 
                       placeholder="Ej. Problema con el teclado">
                <span class="help-text">Breve descripción del incidente</span>
            </div>

            <div class="form-group">
                <label for="categoria_id">Categoría del problema:</label>
                <select id="categoria_id" name="categoria_id" required>
                    <option value="" disabled selected>-- Selecciona una categoría --</option>
                    <option value="1">Petición administrativa</option>
                    <option value="2">Instalación de software</option>
                    <option value="3">Problema de hardware</option>
                    <option value="4">Problema de software</option>
                    <option value="5">Usuario que no puede trabajar</option>
                </select>
            </div>

            <div class="form-group">
                <label for="prioridad_id">Nivel de prioridad:</label>
                <select id="prioridad_id" name="prioridad_id" required>
                    <option value="" disabled selected>-- Selecciona la prioridad --</option>
                    <option value="1">Baja (Puede esperar)</option>
                    <option value="2">Media (Afecta mi trabajo parcial)</option>
                    <option value="3">Alta (Me impide trabajar por completo)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="correo">Correo electrónico:</label>
                <input type="email" id="correo" name="correo" required 
                       placeholder="Tu correo electrónico">
                <span class="help-text">Te contactaremos a esta dirección</span>
            </div>

            <div class="form-group">
                <label for="descripcion">Descripción detallada:</label>
                <textarea id="descripcion" name="descripcion" required 
                          placeholder="Describe con el mayor detalle posible lo que está ocurriendo..."></textarea>
            </div>

            <div class="form-group">
                <button type="submit" class="btn-submit">Enviar Ticket</button>
            </div>

        </form>
    </div>
    
    <script> 
        // Este script se encarga de deshabilitar el botón de envío después de hacer clic para evitar envíos múltiples
        const formulario = document.querySelector('form');

        formulario.addEventListener('submit', function() {
            const botonSubmit = document.querySelector('.btn-submit');
            
            botonSubmit.disabled = true;
            botonSubmit.textContent = 'Enviando ticket...';
            botonSubmit.style.backgroundColor = '#666'; 
            botonSubmit.style.cursor = 'not-allowed';
        });
    </script>

</body>
</html>
